services:

  # ---------------------------------------------------------------------------
  # NGINX Edge Gateway
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    image: uye-edge:latest
    container_name: uye-edge
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # TLS certificates provisioned by Certbot (read-only inside nginx)
      - certbot_certs:/etc/nginx/ssl:ro
      # Certbot webroot for ACME challenge files
      - certbot_webroot:/var/www/certbot:ro
      # Persist access and error logs
      - nginx_logs:/var/log/nginx
    env_file: .env
    networks:
      - edge
    depends_on:
      - go-gateway
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Certbot — certificate issuance and renewal
  # Run once manually: docker compose run --rm certbot
  # Renewal is handled by the certbot-renew.sh cron/script on the host.
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: uye-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    command: >
      certonly --webroot
      --webroot-path=/var/www/certbot
      --email ${CERTBOT_EMAIL}
      --agree-tos
      --no-eff-email
      --keep-until-expiring
      -d ${NGINX_DOMAIN}
      -d www.${NGINX_DOMAIN}
    profiles:
      - certbot

  # ---------------------------------------------------------------------------
  # Prometheus metrics exporter for NGINX stub_status
  # Scrapes /nginx-status and exposes Prometheus metrics on :9113/metrics
  # ---------------------------------------------------------------------------
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3
    container_name: uye-nginx-exporter
    restart: unless-stopped
    command:
      - -nginx.scrape-uri=http://nginx/nginx-status
    ports:
      - "9113:9113"
    networks:
      - edge
    depends_on:
      - nginx
    profiles:
      - observability

  # ---------------------------------------------------------------------------
  # Go Gateway (upstream) — reference entry; replace with your actual service
  # or define it in a separate compose file for that repository.
  # ---------------------------------------------------------------------------
  go-gateway:
    image: "${GO_GATEWAY_IMAGE:-nginx:alpine}"
    container_name: uye-go-gateway
    restart: unless-stopped
    networks:
      - edge
    profiles:
      - stub

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  certbot_certs:
  certbot_webroot:
  nginx_logs:

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  edge:
    driver: bridge
