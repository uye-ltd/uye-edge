# Hide nginx version in Server header and error pages
server_tokens off;

# ---- IP Access Control -------------------------------------------------------
# Populate these geo blocks to whitelist/blacklist ranges at the edge.
# geo $blocked_ip {
#     default         0;
#     10.0.0.1        1;   # block specific IP
#     192.168.1.0/24  1;   # block entire subnet
# }

# ---- Suspicious User-Agent filtering -----------------------------------------
map $http_user_agent $block_ua {
    default          0;
    "~*sqlmap"       1;
    "~*nikto"        1;
    "~*nmap"         1;
    "~*masscan"      1;
    "~*zgrab"        1;
    "~*go-http-client/1\.1$" 0;  # allow Go HTTP clients (e.g., internal services)
    ""               1;          # block empty user-agent
}

# ---- Request method filter ---------------------------------------------------
map $request_method $invalid_method {
    default  0;
    TRACE    1;
    TRACK    1;
    DELETE   0;
    PATCH    0;
}

# ---- Proxy response buffering (protects upstream from slow clients) -----------
proxy_max_temp_file_size 1024m;
