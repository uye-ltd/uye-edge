# ---- Proxy headers -----------------------------------------------------------
# Standard forwarding headers passed to the Go Gateway upstream
proxy_set_header  Host               $host;
proxy_set_header  X-Real-IP          $remote_addr;
proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
proxy_set_header  X-Forwarded-Proto  $scheme;
proxy_set_header  X-Forwarded-Host   $host;
proxy_set_header  X-Forwarded-Port   $server_port;

# Distributed tracing: propagate a unique request ID to all downstream services
proxy_set_header  X-Request-ID       $request_id;

# Prevent leaking upstream internals to clients
proxy_hide_header X-Powered-By;
proxy_hide_header Server;

# ---- HTTP version & connection keep-alive ------------------------------------
# Required for upstream keepalive to work correctly
proxy_http_version  1.1;
proxy_set_header    Connection  "";

# ---- Timeouts ----------------------------------------------------------------
proxy_connect_timeout  10s;
proxy_send_timeout     60s;
proxy_read_timeout     60s;

# ---- Buffering ---------------------------------------------------------------
# Buffers responses from upstream; protects upstream from slow clients.
# Tune based on typical response sizes.
proxy_buffering            on;
proxy_buffers              8 16k;
proxy_buffer_size          32k;
proxy_busy_buffers_size    64k;
proxy_temp_file_write_size 64k;

# ---- Retry behaviour ---------------------------------------------------------
# Only retry on connection failures, not on errors from a live upstream
proxy_next_upstream  error timeout;
proxy_next_upstream_tries    2;
proxy_next_upstream_timeout  10s;
