# Modern TLS configuration (TLSv1.2 + TLSv1.3, strong ciphers)
# Tested against Mozilla SSL Configuration Generator (Intermediate profile)
# https://ssl-config.mozilla.org/

ssl_protocols               TLSv1.2 TLSv1.3;
ssl_ciphers                 ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
ssl_prefer_server_ciphers   off;

# Session cache & tickets
ssl_session_timeout  1d;
ssl_session_cache    shared:SSL:50m;
ssl_session_tickets  off;

# OCSP Stapling — improves TLS handshake performance and privacy
ssl_stapling        on;
ssl_stapling_verify on;
resolver            1.1.1.1 8.8.8.8  valid=300s;
resolver_timeout    5s;

# Optional: Diffie-Hellman params for DHE ciphers
# Generate with: openssl dhparam -out /etc/nginx/ssl/dhparam.pem 2048
# ssl_dhparam /etc/nginx/ssl/dhparam.pem;
