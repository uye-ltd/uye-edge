user  nginx;
worker_processes  auto;
worker_rlimit_nofile  65535;

pid  /var/run/nginx.pid;

error_log  /var/log/nginx/error.log  warn;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Performance --------------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    types_hash_max_size 2048;

    # ---- Client limits -------------------------------------------------------
    client_max_body_size        10m;
    client_body_buffer_size     128k;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 16k;
    client_body_timeout         30s;
    client_header_timeout       30s;
    send_timeout                30s;

    # ---- Modular configuration -----------------------------------------------
    # Static configs
    include /etc/nginx/conf.d/logging.conf;
    include /etc/nginx/conf.d/gzip.conf;
    include /etc/nginx/conf.d/security.conf;
    include /etc/nginx/conf.d/ssl-params.conf;
    include /etc/nginx/conf.d/proxy-params.conf;

    # Env-templated configs (generated from /etc/nginx/templates/ at startup)
    include /etc/nginx/conf.d/rate-limit.conf;
    include /etc/nginx/conf.d/upstream.conf;
    include /etc/nginx/conf.d/http-server.conf;
    include /etc/nginx/conf.d/https-server.conf;
}
