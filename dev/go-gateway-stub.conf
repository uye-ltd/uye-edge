# Stub nginx config that simulates the Go Gateway for local development.
# Returns a JSON response on all routes so you can verify the edge proxy works
# end-to-end without running the actual Go service.
server {
    listen 80;

    location / {
        default_type application/json;
        add_header X-Upstream-Stub "true";
        return 200 '{"service":"go-gateway-stub","path":"$uri","message":"This is a development stub. Replace with the real Go Gateway."}';
    }

    location = /health {
        access_log  off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }
}
