# docker-compose.dev.yml — local development overrides
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Differences from production:
#   - Self-signed TLS certificate (generated by scripts/generate-self-signed.sh)
#   - Stub Go Gateway using nginx:alpine echoing a JSON response
#   - All profiles active by default (no certbot)
#   - nginx-exporter always enabled

services:

  nginx:
    volumes:
      # Mount locally generated self-signed certs instead of Let's Encrypt
      - ./certs/dev:/etc/nginx/ssl:ro
      # Mount configs directly for hot-reload during development
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/templates:/etc/nginx/templates:ro
    env_file: .env.dev

  go-gateway:
    image: nginx:alpine
    container_name: uye-go-gateway-dev
    volumes:
      - ./dev/go-gateway-stub.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - edge
    profiles: []   # always active in dev

  nginx-exporter:
    profiles: []   # always active in dev
